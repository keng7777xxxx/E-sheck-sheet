<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Writer Mobile</title>
    <!-- เรียกใช้ไลบรารีสําหรับจัดการ PDF บนเว็บ -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; touch-action: none; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        button, input[type="file"] { padding: 10px; font-size: 14px; background: #fff; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        #canvas-container { position: relative; border: 2px solid #333; background: white; max-width: 100%; display: inline-block; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

    <div class="controls">
        <!-- ปุ่มดึงไฟล์ PDF จากในมือถือ -->
        <input type="file" id="pdf-input" accept="application/pdf">
        <!-- ปุ่มบันทึกไฟล์หลังจากเขียนเสร็จ -->
        <button id="save-btn" disabled>Save As PDF</button>
        <button id="clear-btn" style="background:#dc3545;">ล้างหน้าจอ</button>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <script>
        const pdfInput = document.getElementById('pdf-input');
        const saveBtn = document.getElementById('save-btn');
        const clearBtn = document.getElementById('clear-btn');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        
        let pdfBytes = null;
        let isDrawing = false;
        let drawingActions = []; // เก็บพิกัดเส้นที่เขียนด้วยปากกา

        // 1. ดึงไฟล์ PDF เข้ามาแสดงผลใน Canvas ของมือถือ
        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            pdfBytes = await file.arrayBuffer();
            
            // ใช้ pdf-lib เพื่อเปิดดูขนาดหน้าแรกและแปลงมาวาดบนหน้าจอ
            const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];
            const { width, height } = firstPage.getSize();

            // ปรับขนาดหน้าจอให้พอดีกับมือถือ (ลดขนาดอัตราส่วนให้เหมาะสม)
            const scale = Math.min((window.innerWidth - 30) / width, 1);
            canvas.width = width * scale;
            canvas.height = height * scale;
            canvas.dataset.scale = scale;

            // วาดพื้นหลังขาวจำลองหน้ากระดาษ PDF
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#555555';
            ctx.font = '16px sans-serif';
            ctx.fillText("โหลดไฟล์สำเร็จ! ใช้ปากกาเขียนลงบนพื้นที่นี้ได้ทันที", 20, 40);

            saveBtn.disabled = false;
            drawingActions = [];
        });

        // 2. ตรวจจับการเขียนด้วยปากกา/นิ้ว (Touch Events สำหรับมือถือ)
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            return {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const pos = getTouchPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineWidth = 3; // ขนาดเส้นปากกา
            ctx.strokeStyle = '#000000'; // สีปากกา (ดำ)
            ctx.lineCap = 'round';
            
            // เก็บพิกัดเริ่มต้นไปแปลงลง PDF
            const scale = parseFloat(canvas.dataset.scale);
            drawingActions.push({ type: 'start', x: pos.x / scale, y: pos.y / scale });
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getTouchPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            const scale = parseFloat(canvas.dataset.scale);
            drawingActions.push({ type: 'move', x: pos.x / scale, y: pos.y / scale });
        });

        canvas.addEventListener('touchend', () => { isDrawing = false; });

        // ปุ่มล้างหน้าจอที่เขียน
        clearBtn.addEventListener('click', () => {
            if(!pdfBytes) return;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawingActions = [];
        });

        // 3. รวมเส้นที่เขียนเข้ากับไฟล์ PDF ต้นฉบับแล้วสั่ง Save As เป็นไฟล์ใหม่
        saveBtn.addEventListener('click', async () => {
            if (!pdfBytes) return;

            const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];
            const { height } = firstPage.getSize();

            // นำเส้นที่วาดบนหน้าจอมือถือไปวาดลงในไฟล์ PDF จริงตามพิกัด
            let lastX = 0;
            let lastY = 0;

            drawingActions.forEach(action => {
                // พิกัด PDF จะนับจากมุมซ้ายล่าง ย้อนขึ้นไปด้านบน (ต้องสลับแกน Y)
                const pdfY = height - action.y; 

                if (action.type === 'start') {
                    lastX = action.x;
                    lastY = pdfY;
                } else if (action.type === 'move') {
                    firstPage.drawLine({
                        start: { x: lastX, y: lastY },
                        end: { x: action.x, y: pdfY },
                        thickness: 3,
                        color: PDFLib.rgb(0, 0, 0),
                    });
                    lastX = action.x;
                    lastY = pdfY;
                }
            });

            // ทำการ Save As ดาวน์โหลดลงมือถือ
            const modifiedPdfBytes = await pdfDoc.save();
            const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            
            // ตั้งชื่อไฟล์ใหม่ตอนบันทึกออกไป
            link.download = "signed_document.pdf";
            link.click();
        });
    </script>
</body>
</html>
