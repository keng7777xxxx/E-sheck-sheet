<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi PDF Loader & Writer</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; touch-action: none; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        select, button { padding: 10px; font-size: 14px; border-radius: 5px; border: 1px solid #ccc; }
        select { background: white; min-width: 150px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 14px; color: #555; font-weight: bold; }
        #canvas-container { position: relative; border: 2px solid #333; background: white; max-width: 100%; display: inline-block; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

    <div class="controls">
        <!-- เมนูสำหรับเลือกไฟล์ PDF บนเซิร์ฟเวอร์ -->
        <select id="pdf-selector">
            <option value="">-- เลือกไฟล์ PDF --</option>
            <option value="form_a.pdf">แบบฟอร์ม A (ใบเช็คระยะ)</option>
            <option value="form_b.pdf">แบบฟอร์ม B (ใบส่งงาน)</option>
            <option value="form_c.pdf">แบบฟอร์ม C (รายงานอุบัติเหตุ)</option>
        </select>
        
        <button id="save-btn" disabled>Save As PDF</button>
        <button id="clear-btn" style="background:#dc3545;">ล้างหน้าจอ</button>
        <span id="status">กรุณาเลือกไฟล์ PDF ที่ต้องการ</span>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <script>
        const pdfSelector = document.getElementById('pdf-selector');
        const statusText = document.getElementById('status');
        const saveBtn = document.getElementById('save-btn');
        const clearBtn = document.getElementById('clear-btn');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        
        let pdfBytes = null;
        let isDrawing = false;
        let drawingActions = [];
        let currentFileName = "document.pdf";

        // ฟังก์ชันดึงไฟล์ตามที่เลือกในเมนู Dropdown
        pdfSelector.addEventListener('change', async (e) => {
            const selectedFile = e.target.value;
            if (!selectedFile) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                saveBtn.disabled = true;
                statusText.innerText = "กรุณาเลือกไฟล์ PDF ที่ต้องการ";
                return;
            }

            statusText.innerText = "กำลังโหลดไฟล์...";
            currentFileName = selectedFile;

            try {
                const response = await fetch(selectedFile);
                if (!response.ok) throw new Error('ไม่พบไฟล์บนเซิร์ฟเวอร์');
                
                pdfBytes = await response.arrayBuffer();
                
                const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
                const pages = pdfDoc.getPages();
                const firstPage = pages[0];
                const { width, height } = firstPage.getSize();

                const scale = Math.min((window.innerWidth - 30) / width, 1);
                canvas.width = width * scale;
                canvas.height = height * scale;
                canvas.dataset.scale = scale;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                statusText.innerText = "โหลดสำเร็จ! เริ่มเขียนได้เลย";
                saveBtn.disabled = false;
                drawingActions = [];
            } catch (error) {
                statusText.innerText = "เกิดข้อผิดพลาด: " + error.message;
                saveBtn.disabled = true;
            }
        });

        // ระบบตรวจจับการวาดเขียน (Touch Events)
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        }

        canvas.addEventListener('touchstart', (e) => {
            if (!pdfBytes) return;
            e.preventDefault();
            isDrawing = true;
            const pos = getTouchPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#000000';
            ctx.lineCap = 'round';
            
            const scale = parseFloat(canvas.dataset.scale);
            drawingActions.push({ type: 'start', x: pos.x / scale, y: pos.y / scale });
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getTouchPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            const scale = parseFloat(canvas.dataset.scale);
            drawingActions.push({ type: 'move', x: pos.x / scale, y: pos.y / scale });
        });

        canvas.addEventListener('touchend', () => { isDrawing = false; });

        clearBtn.addEventListener('click', () => {
            if(!pdfBytes) return;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawingActions = [];
            statusText.innerText = "ล้างหน้าจอแล้ว เริ่มเขียนใหม่ได้";
        });

        // ปุ่มบันทึกไฟล์ (Save As)
        saveBtn.addEventListener('click', async () => {
            if (!pdfBytes) return;

            statusText.innerText = "กำลังประมวลผลไฟล์...";
            const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];
            const { height } = firstPage.getSize();

            let lastX = 0;
            let lastY = 0;

            drawingActions.forEach(action => {
                const pdfY = height - action.y; 

                if (action.type === 'start') {
                    lastX = action.x;
                    lastY = pdfY;
                } else if (action.type === 'move') {
                    firstPage.drawLine({
                        start: { x: lastX, y: lastY },
                        end: { x: action.x, y: pdfY },
                        thickness: 3,
                        color: PDFLib.rgb(0, 0, 0),
                    });
                    lastX = action.x;
                    lastY = pdfY;
                }
            });

            const modifiedPdfBytes = await pdfDoc.save();
            const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            
            // ตั้งชื่อไฟล์ปลายทางโดยเติมคำว่า signed_ นำหน้าชื่อไฟล์เดิม
            link.download = "signed_" + currentFileName;
            link.click();
            statusText.innerText = "บันทึกไฟล์สำเร็จ!";
        });
    </script>
</body>
</html>
