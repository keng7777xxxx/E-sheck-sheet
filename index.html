<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Search & Writer</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; touch-action: none; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        input[type="text"], button { padding: 10px; font-size: 14px; border-radius: 5px; border: 1px solid #ccc; }
        
        /* สไตล์ของกล่องค้นหาและรายการผลลัพธ์ */
        .search-container { position: relative; display: inline-block; }
        .search-results { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border: 1px solid #ccc; border-radius: 5px; 
            max-height: 200px; overflow-y: auto; z-index: 1000; display: none; 
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .search-item:hover { background: #f0f0f0; }

        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 14px; color: #555; font-weight: bold; }
        #canvas-container { position: relative; border: 2px solid #333; background: white; max-width: 100%; display: inline-block; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

    <div class="controls">
        <!-- ช่องสำหรับพิมพ์ค้นหาชื่อไฟล์ -->
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 พิมพ์ค้นหาชื่อไฟล์ PDF..." autocomplete="off">
            <div id="search-results" class="search-results"></div>
        </div>
        
        <button id="save-btn" disabled>Save As PDF</button>
        <button id="clear-btn" style="background:#dc3545;">ล้างหน้าจอ</button>
        <span id="status">กรุณาพิมพ์ค้นหาไฟล์ PDF ที่ต้องการ</span>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <script>
        // === 1. รายชื่อไฟล์ PDF ทั้งหมดบนเซิร์ฟเวอร์ (เมื่อมีไฟล์เพิ่มในอนาคต ให้มาพิมพ์เพิ่มที่นี่) ===
        const pdfFiles = [
            { name: "form_a.pdf", label: "แบบฟอร์ม A (ใบเช็คระยะเครื่องจักร)" },
            { name: "form_b.pdf", label: "แบบฟอร์ม B (ใบส่งมอบงานประจำวัน)" },
            { name: "form_c.pdf", label: "แบบฟอร์ม C (รายงานอุบัติเหตุในคลังสินค้า)" },
            { name: "checklist_safety.pdf", label: "ใบเช็คลิสต์ความปลอดภัยโรงงาน" },
            { name: "report_monthly.pdf", label: "แบบฟอร์มรายงานสรุปประจำเดือน" }
        ];

        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const statusText = document.getElementById('status');
        const saveBtn = document.getElementById('save-btn');
        const clearBtn = document.getElementById('clear-btn');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        
        let pdfBytes = null;
        let isDrawing = false;
        let drawingActions = [];
        let currentFileName = "document.pdf";

        // === 2. ระบบกรองชื่อไฟล์อัจฉริยะตามคำที่พิมพ์ ===
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            searchResults.innerHTML = '';
            
            if (!keyword) {
                searchResults.style.display = 'none';
                return;
            }

            // ค้นหาได้ทั้งจากชื่อไฟล์จริง และชื่อภาษาไทยที่แสดง
            const matchedFiles = pdfFiles.filter(file => 
                file.name.toLowerCase().includes(keyword) || 
                file.label.toLowerCase().includes(keyword)
            );

            if (matchedFiles.length > 0) {
                matchedFiles.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerText = file.label;
                    // เมื่อกดเลือกไฟล์จากรายการค้นหา
                    div.addEventListener('click', () => {
                        searchInput.value = file.label;
                        searchResults.style.display = 'none';
                        loadPdfFile(file.name);
                    });
                    searchResults.appendChild(div);
                });
                searchResults.style.display = 'block';
            } else {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.style.color = '#999';
                div.innerText = '❌ ไม่พบไฟล์ที่ตรงกัน';
                searchResults.appendChild(div);
                searchResults.style.display = 'block';
            }
        });

        // ปิดกล่องค้นหาเมื่อคลิกพื้นที่อื่น
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.style.display = 'none';
            }
        });

        // === 3. ฟังก์ชันดึงไฟล์ PDF มาแสดงผล ===
        async function loadPdfFile(fileName) {
            statusText.innerText = "กำลังดึงไฟล์จากเซิร์ฟเวอร์...";
            currentFileName = fileName;

            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error('ไม่พบไฟล์บนเซิร์ฟเวอร์ กรุณาตรวจสอบการอัปโหลด');
                
                pdfBytes = await response.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
                const pages = pdfDoc.getPages();
                const firstPage = pages[0];
                const { width, height } = firstPage.getSize();

                const scale = Math.min((window.innerWidth - 30) / width, 1);
                canvas.width = width * scale;
                canvas.height = height * scale;
                canvas.dataset.scale = scale;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                statusText.innerText = "โหลดสำเร็จ! ใช้ปากกาเขียนได้เลย";
                saveBtn.disabled = false;
                drawingActions = [];
            } catch (error) {
                statusText.innerText = "เกิดข้อผิดพลาด: " + error.message;
                saveBtn.disabled = true;
            }
        }

        // === 4. ระบบตรวจจับการเขียนหน้าจอ (Touch Events) ===
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        }

        canvas.addEventListener('touchstart', (e) => {
            if (!pdfBytes) return;
            e.preventDefault();
            isDrawing = true;
            const pos = getTouchPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#000000';
            ctx.lineCap = 'round';
            
            const scale = parseFloat(canvas.dataset.scale);
            drawingActions.push({ type: 'start', x: pos.x / scale, y: pos.y / scale });
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getTouchPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            const scale = parseFloat(canvas.dataset.scale);
            drawingActions.push({ type: 'move', x: pos.x / scale, y: pos.y / scale });
        });

        canvas.addEventListener('touchend', () => { isDrawing = false; });

        clearBtn.addEventListener('click', () => {
            if(!pdfBytes) return;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawingActions = [];
            statusText.innerText = "ล้างหน้าจอแล้ว เริ่มเขียนใหม่ได้";
        });

        // === 5. ระบบประมวลผลเซฟไฟล์ใหม่ (Save As) ===
        saveBtn.addEventListener('click', async () => {
            if (!pdfBytes) return;

            statusText.innerText = "กำลังประมวลผลไฟล์...";
            const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];
            const { height } = firstPage.getSize();

            let lastX = 0;
            let lastY = 0;

            drawingActions.forEach(action => {
                const pdfY = height - action.y; 

                if (action.type === 'start') {
                    lastX = action.x;
                    lastY = pdfY;
                } else if (action.type === 'move') {
                    firstPage.drawLine({
                        start: { x: lastX, y: lastY },
                        end: { x: action.x, y: pdfY },
                        thickness: 3,
                        color: PDFLib.rgb(0, 0, 0),
                    });
                    lastX = action.x;
                    lastY = pdfY;
                }
            });

            const modifiedPdfBytes = await pdfDoc.save();
            const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            
            link.download = "signed_" + currentFileName;
            link.click();
            statusText.innerText = "บันทึกไฟล์สำเร็จ!";
        });
    </script>
</body>
</html>
