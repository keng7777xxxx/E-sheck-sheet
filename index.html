<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Search & Writer (Multi-Page with Zoom & Undo)</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        input[type="text"], button { padding: 10px; font-size: 14px; border-radius: 5px; border: 1px solid #ccc; }
        
        .search-container { position: relative; display: inline-block; }
        .search-results { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border: 1px solid #ccc; border-radius: 5px; 
            max-height: 200px; overflow-y: auto; z-index: 1000; display: none; 
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .search-item:hover { background: #f0f0f0; }

        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .page-controls, .zoom-controls { display: flex; align-items: center; gap: 5px; background: #fff; padding: 5px 10px; border-radius: 5px; border: 1px solid #ccc; }
        .zoom-controls button { padding: 5px 10px; font-weight: bold; }
        
        #status { font-size: 14px; color: #555; font-weight: bold; width: 100%; margin-top: 5px; }
        
        #scroll-wrapper { width: 100%; overflow: auto; border: 2px solid #333; background: #525659; border-radius: 5px; margin-top: 10px; }
        #canvas-container { position: relative; background: white; margin: 10px auto; display: block; }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 พิมพ์ค้นหาชื่อไฟล์ PDF..." autocomplete="off">
            <div id="search-results" class="search-results"></div>
        </div>
        
        <div class="page-controls">
            <button id="prev-page-btn" disabled>◀</button>
            <span id="page-num-display">หน้า: 0 / 0</span>
            <button id="next-page-btn" disabled>▶</button>
        </div>

        <div class="zoom-controls">
            <button id="zoom-out-btn" disabled>🔍- ย่อ</button>
            <span id="zoom-percent">100%</span>
            <button id="zoom-in-btn" disabled>🔍+ ขยาย</button>
            <button id="zoom-reset-btn" style="background:#6c757d;" disabled>พอดีหน้าจอ</button>
        </div>

        <button id="undo-btn" style="background:#ffc107; color:#000;" disabled>↩️ ย้อนกลับ</button>
        <button id="save-btn" disabled>Save As PDF</button>
        <button id="clear-btn" style="background:#dc3545;">ล้างหน้าเฉพาะหน้านี้</button>
        
        <div id="status">กรุณาพิมพ์ค้นหาไฟล์ PDF ที่ต้องการ</div>
    </div>

    <div id="scroll-wrapper">
        <div id="canvas-container">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const pdfFiles = [
            { name: "62511 2LS0H.pdf", label: "62511 2LS0H" },
            { name: "65140 2LS0A.pdf", label: "65140 2LS0A" }
        ];

        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const statusText = document.getElementById('status');
        const saveBtn = document.getElementById('save-btn');
        const clearBtn = document.getElementById('clear-btn');
        const undoBtn = document.getElementById('undo-btn'); 
        const canvas = document.getElementById('pdf-canvas');
        const canvasContainer = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        
        const prevPageBtn = document.getElementById('prev-page-btn');
        const nextPageBtn = document.getElementById('next-page-btn');
        const pageNumDisplay = document.getElementById('page-num-display');
        
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomResetBtn = document.getElementById('zoom-reset-btn');
        const zoomPercentText = document.getElementById('zoom-percent');
        
        let pdfBytes = null;
        let pdfDocLib = null; 
        let isDrawing = false;
        let currentFileName = "document.pdf";
        
        let currentPageNum = 1;
        let totalPagesCount = 0;
        
        let baseScale = 1.0; 
        let currentZoomLevel = 1.0; 
        
        let drawingActionsByPage = {};
