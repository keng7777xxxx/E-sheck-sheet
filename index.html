<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Search & Writer (Multi-Page, Zoom, Undo, Mode Switch)</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        input[type="text"], button { padding: 10px; font-size: 14px; border-radius: 5px; border: 1px solid #ccc; }
        
        .search-container { position: relative; display: inline-block; }
        .search-results { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border: 1px solid #ccc; border-radius: 5px; 
            max-height: 200px; overflow-y: auto; z-index: 1000; display: none; 
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .search-item:hover { background: #f0f0f0; }

        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .page-controls, .zoom-controls, .mode-controls { display: flex; align-items: center; gap: 5px; background: #fff; padding: 5px 10px; border-radius: 5px; border: 1px solid #ccc; }
        .zoom-controls button { padding: 5px 10px; font-weight: bold; }
        
        /* สไตล์ของปุ่มสลับโหมด */
        .mode-btn { background: #6c757d; font-weight: bold; }
        .mode-btn.active { background: #28a745; color: white; }

        #status { font-size: 14px; color: #555; font-weight: bold; width: 100%; margin-top: 5px; }
        
        #scroll-wrapper { 
            width: 100%; 
            max-height: 65vh; 
            overflow: auto; 
            border: 2px solid #333; 
            background: #525659; 
            border-radius: 5px; 
            margin-top: 10px;
            -webkit-overflow-scrolling: touch; 
        }
        #canvas-container { position: relative; background: white; margin: 10px auto; display: block; }
        canvas { display: block; cursor: crosshair; }
        
        /* เมื่อเปิดโหมดเลื่อนหน้าจอ ให้เปลี่ยนสัญลักษณ์เมาส์เป็นรูปมือ */
        canvas.mode-scroll { cursor: grab; touch-action: auto !important; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 พิมพ์ค้นหาชื่อไฟล์ PDF..." autocomplete="off">
            <div id="search-results" class="search-results"></div>
        </div>
        
        <div class="page-controls">
            <button id="prev-page-btn" disabled>◀</button>
            <span id="page-num-display">หน้า: 0 / 0</span>
            <button id="next-page-btn" disabled>▶</button>
        </div>

        <div class="zoom-controls">
            <button id="zoom-out-btn" disabled>🔍- ย่อ</button>
            <span id="zoom-percent">100%</span>
            <button id="zoom-in-btn" disabled>🔍+ ขยาย</button>
            <button id="zoom-reset-btn" style="background:#6c757d;" disabled>พอดีหน้าจอ</button>
        </div>

        <div class="mode-controls">
            <button id="draw-mode-btn" class="mode-btn active" disabled>✏️ โหมดปากกา</button>
            <button id="scroll-mode-btn" class="mode-btn" disabled>🖐️ โหมดเลื่อนจอ</button>
        </div>

        <button id="undo-btn" style="background:#ffc107; color:#000;" disabled>↩️ ย้อนกลับ</button>
        <button id="save-btn" disabled>Save As PDF</button>
        <button id="clear-btn" style="background:#dc3545;">ล้างหน้าเฉพาะหน้านี้</button>
        
        <div id="status">กรุณาพิมพ์ค้นหาไฟล์ PDF ที่ต้องการ</div>
    </div>

    <div id="scroll-wrapper">
        <div id="canvas-container">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const pdfFiles = [
            { name: "62511 2LS0H.pdf", label: "62511 2LS0H" },
            { name: "65140 2LS0A.pdf", label: "65140 2LS0A" }
        ];

        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const statusText = document.getElementById('status');
        const saveBtn = document.getElementById('save-btn');
        const clearBtn = document.getElementById('clear-btn');
        const undoBtn = document.getElementById('undo-btn'); 
        const canvas = document.getElementById('pdf-canvas');
        const canvasContainer = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        
        const prevPageBtn = document.getElementById('prev-page-btn');
        const nextPageBtn = document.getElementById('next-page-btn');
        const pageNumDisplay = document.getElementById('page-num-display');
        
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomResetBtn = document.getElementById('zoom-reset-btn');
        const zoomPercentText = document.getElementById('zoom-percent');

        // ปุ่มควบคุมโหมด
        const drawModeBtn = document.getElementById('draw-mode-btn');
        const scrollModeBtn = document.getElementById('scroll-mode-btn');
        
        let pdfBytes = null;
        let pdfDocLib = null; 
        let isDrawing = false;
        let currentFileName = "document.pdf";
        
        let currentPageNum = 1;
        let totalPagesCount = 0;
        
        let baseScale = 1.0; 
        let currentZoomLevel = 1.0; 
        
        let drawingActionsByPage = {}; 
        let currentMode = "draw"; // โหมดเริ่มต้นคือ "draw" (ปากกา), สลับเป็น "scroll" (เลื่อนจอ)

        const fixedThickness = 0.5;

        // === 1. ระบบค้นหาไฟล์ ===
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            searchResults.innerHTML = '';
            if (!keyword) { searchResults.style.display = 'none'; return; }

            const matchedFiles = pdfFiles.filter(file => 
                file.name.toLowerCase().includes(keyword) || file.label.toLowerCase().includes(keyword)
            );

            if (matchedFiles.length > 0) {
                matchedFiles.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerText = file.label;
                    div.addEventListener('click', () => {
                        searchInput.value = file.label;
                        searchResults.style.display = 'none';
                        loadPdfFile(file.name);
                    });
                    searchResults.appendChild(div);
                });
                searchResults.style.display = 'block';
            } else {
                const div = document.createElement('div');
                div.className = 'search-item'; div.style.color = '#999'; div.innerText = '❌ ไม่พบไฟล์ที่ตรงกัน';
                searchResults.appendChild(div); searchResults.style.display = 'block';
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) { searchResults.style.display = 'none'; }
        });

        // === 2. ฟังก์ชันโหลดไฟล์ PDF ===
        async function loadPdfFile(fileName) {
            statusText.innerText = "กำลังดึงไฟล์จากเซิร์ฟเวอร์...";
            currentFileName = fileName;
            drawingActionsByPage = {}; 
            currentPageNum = 1;
            currentZoomLevel = 1.0; 
            switchMode("draw"); // โหลดไฟล์ใหม่ ให้กลับมาโหมดปากกาเสมอ

            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error('ไม่พบไฟล์บนเซิร์ฟเวอร์ กรุณาตรวจสอบชื่อไฟล์ PDF');
                pdfBytes = await response.arrayBuffer();
                
                const loadingTask = pdfjsLib.getDocument({ data: new Uint8Array(pdfBytes.slice(0)) });
                pdfDocLib = await loadingTask.promise;
                totalPagesCount = pdfDocLib.numPages;

                const page = await pdfDocLib.getPage(currentPageNum);
                const viewport = page.getViewport({ scale: 1.0 });
                baseScale = Math.min((window.innerWidth - 40) / viewport.width, 1.5);

                await renderPage(currentPageNum);
                
                saveBtn.disabled = false;
                zoomInBtn.disabled = false;
                zoomOutBtn.disabled = false;
                zoomResetBtn.disabled = false;
                drawModeBtn.disabled = false;
                scrollModeBtn.disabled = false;
            } catch (error) {
                statusText.innerText = "เกิดข้อผิดพลาด: " + error.message;
                saveBtn.disabled = true;
                updatePageControls();
            }
        }

        // === 3. ฟังก์ชันเรนเดอร์เนื้อหาพร้อมคำนวณอัตราซูม ===
        async function renderPage(pageNumber) {
            if (!pdfDocLib) return;
            statusText.innerText = `กำลังเรนเดอร์หน้าอนุมัติที่ ${pageNumber}... (ซูม: ${Math.round(currentZoomLevel * 100)}%)`;

            try {
                const page = await pdfDocLib.getPage(pageNumber);
                const finalScale = baseScale * currentZoomLevel;
                const scaledViewport = page.getViewport({ scale: finalScale });

                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                
                canvasContainer.style.width = scaledViewport.width + 'px';
                canvasContainer.style.height = scaledViewport.height + 'px';
                
                canvas.dataset.finalScale = finalScale; 

                const renderContext = {
                    canvasContext: ctx,
                    viewport: scaledViewport
                };
                await page.render(renderContext).promise;

                if (drawingActionsByPage[pageNumber]) {
                    redrawCurrentPageLines();
                }

                zoomPercentText.innerText = `${Math.round(currentZoomLevel * 100)}%`;
                statusText.innerText = currentMode === "draw" ? `หน้า ${pageNumber} โหลดสำเร็จ! ใช้ปากกาเขียนได้เลย` : `หน้า ${pageNumber} โหลดสำเร็จ! ใช้นิ้วปัดเลื่อนหน้าจอได้อิสระ`;
                updatePageControls();
                updateUndoButtonState(); 
            } catch (error) {
                statusText.innerText = "เกิดข้อผิดพลาดในการซูม/เรนเดอร์หน้า: " + error.message;
            }
        }

        function redrawCurrentPageLines() {
            const actions = drawingActionsByPage[currentPageNum] || [];
            const finalScale = parseFloat(canvas.dataset.finalScale);

            ctx.strokeStyle = '#000000';
            ctx.lineCap = 'round';
            ctx.lineWidth = fixedThickness;

            actions.forEach(action => {
                const screenX = action.x * finalScale;
                const screenY = action.y * finalScale;

                if (action.type === 'start') {
                    ctx.beginPath();
                    ctx.moveTo(screenX, screenY);
                } else if (action.type === 'move') {
                    ctx.lineTo(screenX, screenY);
                    ctx.stroke();
                }
            });
        }

        function updatePageControls() {
            pageNumDisplay.innerText = `หน้า: ${currentPageNum} / ${totalPagesCount}`;
            prevPageBtn.disabled = (currentPageNum <= 1);
            nextPageBtn.disabled = (currentPageNum >= totalPagesCount);
        }

        function updateUndoButtonState() {
            const actions = drawingActionsByPage[currentPageNum] || [];
            undoBtn.disabled = (actions.length === 0);
        }

        // === 4. ระบบสลับโหมด (ปากกา / เลื่อนจอ) ===
        function switchMode(mode) {
            currentMode = mode;
            if (mode === "draw") {
                drawModeBtn.classList.add("active");
                scrollModeBtn.classList.remove("active");
                canvas.classList.remove("mode-scroll");
                statusText.innerText = "เปิดโหมดปากกาแล้ว (ใช้นิ้วเขียนหนังสือ)";
            } else {
                drawModeBtn.classList.remove("active");
                scrollModeBtn.classList.add("active");
                canvas.classList.add("mode-scroll");
                statusText.innerText = "เปิดโหมดเลื่อนจอแล้ว (ใช้ 1 นิ้วปัดเลื่อนกระดาษดูจุดอื่นๆ ได้เลย)";
            }
        }

        drawModeBtn.addEventListener('click', () => switchMode("draw"));
        scrollModeBtn.addEventListener('click', () => switchMode("scroll"));

        // === ระบบควบคุมการ Zoom ===
        zoomInBtn.addEventListener('click', () => {
            if (currentZoomLevel < 3.0) { currentZoomLevel += 0.25; renderPage(currentPageNum); }
        });

        zoomOutBtn.addEventListener('click', () => {
            if (currentZoomLevel > 0.5) { currentZoomLevel -= 0.25; renderPage(currentPageNum); }
        });

        zoomResetBtn.addEventListener('click', () => {
            currentZoomLevel = 1.0; renderPage(currentPageNum);
        });

        prevPageBtn.addEventListener('click', () => {
            if (currentPageNum > 1) { currentPageNum--; renderPage(currentPageNum); }
        });

        nextPageBtn.addEventListener('click', () => {
            if (currentPageNum < totalPagesCount) { currentPageNum++; renderPage(currentPageNum); }
        });

        // === ระบบปุ่ม Undo ===
        undoBtn.addEventListener('click', () => {
            let actions = drawingActionsByPage[currentPageNum] || [];
            if (actions.length === 0) return;

            while (actions.length > 0) {
                const lastAction = actions.pop();
                if (lastAction.type === 'start') {
                    break; 
                }
            }
            renderPage(currentPageNum);
        });

        // === 5. ระบบตรวจจับปากกา ===
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            if (!pdfBytes) return;
            
            // สำคัญที่สุด: ถ้าปัจจุบันอยู่ในโหมด "เลื่อนจอ" ให้ปล่อยผ่าน ห้ามวาดเส้น ห้ามบล็อกเบราว์เซอร์
            if (currentMode === "scroll") {
                isDrawing = false;
                return; 
            }
            
            // ถ้าอยู่ในโหมดปากกา ให้ทำการบล็อกจอเลื่อนเพื่อลากเส้น
            if (e.type === 'touchstart') e.preventDefault();
            
            isDrawing = true;
            const pos = getPos(e);
            
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineWidth = fixedThickness; 
            ctx.strokeStyle = '#000000';
            ctx.lineCap = 'round';
            
            const finalScale = parseFloat(canvas.dataset.finalScale);
            if (!drawingActionsByPage[currentPageNum]) drawingActionsByPage[currentPageNum] = [];
            
            drawingActionsByPage[currentPageNum].push({ 
                type: 'start', 
                x: pos.x / finalScale, 
                y: pos.y / finalScale 
            });
        }

        function draw(e) {
            if (!isDrawing || currentMode === "scroll") return;
            
            if (e.type === 'touchmove') e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            const finalScale = parseFloat(canvas.dataset.finalScale);
            drawingActionsByPage[currentPageNum].push({ 
                type: 'move', 
                x: pos.x / finalScale, 
                y: pos.y / finalScale 
            });
        }

        function stopDrawing() { 
            if (isDrawing) {
                isDrawing = false; 
                updateUndoButtonState(); 
            }
        }

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        clearBtn.addEventListener('click', () => {
            if(pdfBytes) {
                drawingActionsByPage[currentPageNum] = []; 
                renderPage(currentPageNum); 
            }
        });

        // === 6. ระบบรวมเอกสารบันทึกส่งออก (Save As PDF) ===
        saveBtn.addEventListener('click', async () => {
            if (!pdfBytes) return;

            statusText.innerText = "กำลังประมวลผลฝังเส้นวาดลงไฟล์ฉบับเต็ม...";
            const pdfDocModifier = await PDFLib.PDFDocument.load(pdfBytes);
            const pages = pdfDocModifier.getPages();

            Object.keys(drawingActionsByPage).forEach(pageIdxStr => {
                const pageIndex = parseInt(pageIdxStr) - 1; 
                const targetPage = pages[pageIndex];
                if (!targetPage) return;

                const { height } = targetPage.getSize();
                const actions = drawingActionsByPage[pageIdxStr];
                
                let lastX = 0; lastY = 0;

                actions.forEach(action => {
                    const pdfY = height - action.y; 

                    if (action.type === 'start') {
                        lastX = action.x;
                        lastY = pdfY;
                    } else if (action.type === 'move') {
                        targetPage.drawLine({
                            start: { x: lastX, y: lastY },
                            end: { x: action.x, y: pdfY },
                            thickness: fixedThickness, 
                            color: PDFLib.rgb(0, 0, 0),
                        });
                        lastX = action.x; lastY = pdfY;
                    }
                });
            });

            const modifiedPdfBytes = await pdfDocModifier.save();
            const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            
            link.download = "signed_" + currentFileName;
            link.click();
            statusText.innerText = "ดาวน์โหลดไฟล์ PDF ตัวซูมเขียนสำเร็จ!";
        });
    </script>
</body>
</html>
