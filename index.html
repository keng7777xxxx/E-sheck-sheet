<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Search & Writer</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        input[type="text"], button { padding: 10px; font-size: 14px; border-radius: 5px; border: 1px solid #ccc; }
        
        .search-container { position: relative; display: inline-block; }
        .search-results { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border: 1px solid #ccc; border-radius: 5px; 
            max-height: 200px; overflow-y: auto; z-index: 1000; display: none; 
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .search-item:hover { background: #f0f0f0; }

        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:active { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 14px; color: #555; font-weight: bold; }
        #canvas-container { position: relative; border: 2px solid #333; background: white; max-width: 100%; display: inline-block; }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 พิมพ์ค้นหาชื่อไฟล์ PDF..." autocomplete="off">
            <div id="search-results" class="search-results"></div>
        </div>
        
        <button id="save-btn" disabled>Save As PDF</button>
        <button id="clear-btn" style="background:#dc3545;">ล้างหน้าจอ</button>
        <span id="status">กรุณาพิมพ์ค้นหาไฟล์ PDF ที่ต้องการ</span>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <script>
        // ตั้งค่าพาสเวิร์กเกอร์ของ PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const pdfFiles = [
            { name: "62511 2LS0H.pdf", label: "62511 2LS0H (62511 2LS0H)" },
            { name: "65140 2LS0A.pdf", label: "65140 2LS0A (5140 2LS0A)" }
        ];

        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const statusText = document.getElementById('status');
        const saveBtn = document.getElementById('save-btn');
        const clearBtn = document.getElementById('clear-btn');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        
        let pdfBytes = null;
        let isDrawing = false;
        let drawingActions = [];
        let currentFileName = "document.pdf";
        let originalPdfWidth = 0;
        let originalPdfHeight = 0;

        // === ค้นหาไฟล์ ===
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            searchResults.innerHTML = '';
            
            if (!keyword) {
                searchResults.style.display = 'none';
                return;
            }

            const matchedFiles = pdfFiles.filter(file => 
                file.name.toLowerCase().includes(keyword) || 
                file.label.toLowerCase().includes(keyword)
            );

            if (matchedFiles.length > 0) {
                matchedFiles.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerText = file.label;
                    div.addEventListener('click', () => {
                        searchInput.value = file.label;
                        searchResults.style.display = 'none';
                        loadPdfFile(file.name);
                    });
                    searchResults.appendChild(div);
                });
                searchResults.style.display = 'block';
            } else {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.style.color = '#999';
                div.innerText = '❌ 不พบไฟล์ที่ตรงกัน';
                searchResults.appendChild(div);
                searchResults.style.display = 'block';
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.style.display = 'none';
            }
        });

        // === ฟังก์ชันดึงและวาด PDF ลงหน้าจอ ===
        async function loadPdfFile(fileName) {
            statusText.innerText = "กำลังดึงไฟล์และเรนเดอร์หน้าจอ...";
            currentFileName = fileName;
            drawingActions = [];

            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error('ไม่พบไฟล์บนเซิร์ฟเวอร์ กรุณาตรวจสอบชื่อไฟล์ PDF');
                
                pdfBytes = await response.arrayBuffer();

                // 1. ใช้ PDF.js โหลดมาวาดบนหน้าจอก่อน
                const loadingTask = pdfjsLib.getDocument({ data: new Uint8Array(pdfBytes.slice(0)) });
                const pdfViewerDoc = await loadingTask.promise;
                const page = await pdfViewerDoc.getPage(1);
                
                // คำนวณขนาดหน้าจอคู่ขนานเพื่อให้เหมาะกับอุปกรณ์
                const viewport = page.getViewport({ scale: 1.0 });
                originalPdfWidth = viewport.width;
                originalPdfHeight = viewport.height;

                const displayScale = Math.min((window.innerWidth - 30) / originalPdfWidth, 1.5);
                const scaledViewport = page.getViewport({ scale: displayScale });

                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.dataset.scale = displayScale;

                // สั่งวาดเนื้อหา PDF ลงบน Canvas จริงๆ
                const renderContext = {
                    canvasContext: ctx,
                    viewport: scaledViewport
                };
                await page.render(renderContext).promise;
                
                statusText.innerText = "โหลดสำเร็จ! เริ่มเขียนบนหน้าจอได้เลย";
                saveBtn.disabled = false;
            } catch (error) {
                statusText.innerText = "เกิดข้อผิดพลาด: " + error.message;
                saveBtn.disabled = true;
            }
        }

        // === ระบบวาดเส้น ===
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            if (!pdfBytes) return;
            if (e.type === 'touchstart') e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#000000';
            ctx.lineCap = 'round';
            
            const displayScale = parseFloat(canvas.dataset.scale);
            drawingActions.push({ type: 'start', x: pos.x / displayScale, y: pos.y / displayScale });
        }

        function draw(e) {
            if (!isDrawing) return;
            if (e.type === 'touchmove') e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            const displayScale = parseFloat(canvas.dataset.scale);
            drawingActions.push({ type: 'move', x: pos.x / displayScale, y: pos.y / displayScale });
        }

        function stopDrawing() { isDrawing = false; }

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        // รีเซ็ตหน้าจอ (โหลดเอกสารเดิมมาทับเพื่อล้างเส้นวาด)
        clearBtn.addEventListener('click', () => {
            if(currentFileName && pdfBytes) {
                loadPdfFile(currentFileName);
            }
        });

        // === ระบบบันทึกไฟล์ (Save As PDF) ===
        saveBtn.addEventListener('click', async () => {
            if (!pdfBytes) return;

            statusText.innerText = "กำลังประมวลผลไฟล์...";
            // นำไฟล์ต้นฉบับมาเขียนทับด้วย PDFLib
            const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];
            const { height } = firstPage.getSize();

            let lastX = 0;
            let lastY = 0;

            drawingActions.forEach(action => {
                // คำนวณพิกัด Y กลับด้านเนื่องจากพิกัด PDF เริ่มจากซ้ายล่าง
                const pdfY = height - action.y; 

                if (action.type === 'start') {
                    lastX = action.x;
                    lastY = pdfY;
                } else if (action.type === 'move') {
                    firstPage.drawLine({
                        start: { x: lastX, y: lastY },
                        end: { x: action.x, y: pdfY },
                        thickness: 3,
                        color: PDFLib.rgb(0, 0, 0),
                    });
                    lastX = action.x;
                    lastY = pdfY;
                }
            });

            const modifiedPdfBytes = await pdfDoc.save();
            const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            
            link.download = "signed_" + currentFileName;
            link.click();
            statusText.innerText = "บันทึกไฟล์สำเร็จ!";
        });
    </script>
</body>
</html>
